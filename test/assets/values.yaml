allowedHosts:
  - "."
initialAdminHashPassword:
  enabled: true
  secretName: horizon-secrets
  secretKey: initialAdminHashPassword
defaultVault:
  keyset:
    secretName: horizon-secrets
    secretKey: keyset
license:
  secretName: horizon-secrets
  secretKey: license
temporaryDatabase:
  enabled: true
  extraVolumes:
    - name: mongo-initdb
      configMap:
        name: mongo-initdb
  extraVolumeMounts:
    - name: mongo-initdb
      mountPath: /docker-entrypoint-initdb.d
extraVolumes:
  - name: cert
    secret:
      secretName: horizon-certificate
      items:
        - key: keystore.p12
          path: cert.p12
extraVolumeMounts:
  - name: cert
    mountPath: /opt/horizon/ssl
environment:
  - name: HTTPS_KEYSTORE_PATH
    value: /opt/horizon/ssl/cert.p12
  - name: HTTPS_KEYSTORE_PASSWORD
    value: password
  - name: HTTPS_KEYSTORE_TYPE
    value: jks
extraObjects:
  - apiVersion: v1
    kind: Secret
    metadata:
      name: horizon-pkcs12-password
    stringData:
      password: password
  - apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: horizon-certificate
    spec:
      secretName: horizon-certificate
      commonName: horizon.horizon.svc.cluster.local
      dnsNames:
        - horizon.horizon.svc.cluster.local
      issuerRef:
        name: local-ca
      keystores:
        pkcs12:
          create: true
          passwordSecretRef:
            name: horizon-pkcs12-password
            key: password
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: mongo-initdb
