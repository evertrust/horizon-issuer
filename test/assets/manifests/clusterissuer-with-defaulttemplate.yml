apiVersion: horizon.evertrust.io/v1beta1
kind: ClusterIssuer
metadata:
  name: clusterissuer-with-defaulttemplate
spec:
  url: http://horizon.horizon.svc.cluster.local:9000
  profile: issuer
  authSecretName: horizon-credentials
  defaultTemplate:
    owner: administrator
    team: rocket
    contactEmail: user@rocket.com
    labels:
      environment: staging
