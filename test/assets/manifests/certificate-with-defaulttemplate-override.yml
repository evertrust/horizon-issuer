apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: certificate-with-defaulttemplate-override
  annotations:
    horizon.evertrust.io/owner: user
    horizon.evertrust.io/team: dx
    horizon.evertrust.io/contact-email: test@rocket.com
    horizon.evertrust.io/labels.environment: prod
spec:
  commonName: certificate-with-defaulttemplate-override.org
  secretName: certificate-with-defaulttemplate-override
  issuerRef:
    group: horizon.evertrust.io
    kind: ClusterIssuer
    name: clusterissuer-with-defaulttemplate
