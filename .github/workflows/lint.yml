name: Lint

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  lint:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Mise
        uses: jdx/mise-action@v2

      - name: Run linter
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.5.0
