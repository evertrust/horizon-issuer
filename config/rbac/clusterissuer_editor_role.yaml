# This rule is not used by the project horizon-issuer itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the horizon.evertrust.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: horizon-issuer
    app.kubernetes.io/managed-by: kustomize
  name: clusterissuer-editor-role
rules:
- apiGroups:
  - horizon.evertrust.io
  resources:
  - clusterissuers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - horizon.evertrust.io
  resources:
  - clusterissuers/status
  verbs:
  - get
